version: 1
default_environment: dev
project_id: 019ed62a-d6f3-7ea2-8d17-2adb378d8a49
environments:
- name: dev
- name: staging
- name: prod
plugins:
  extractors:
  - name: tap-facebook-systemtoken
    variant: matatika
    pip_url: git+https://github.com/Matatika/tap-facebook.git
  - name: tap-facebook
    variant: matatika
    pip_url: git+https://github.com/Matatika/tap-facebook.git@feature/new-page-videos-endpoint
    select:
    - pages.*
    - page_videos.*
  loaders:
  - name: target-postgres
    variant: matatika
    pip_url: git+https://github.com/Matatika/pipelinewise-target-postgres.git@v0.2.1
  transformers:
  - name: dbt
    variant: dbt-labs
    pip_url: dbt-core~=1.7.0 dbt-postgres~=1.7.0 dbt-snowflake~=1.7.0 dbt-bigquery~=1.7.0 dbt-sqlserver~=1.7.0 certifi==2025.1.31
  files:
  - name: files-dbt
    variant: matatika
    pip_url: git+https://github.com/Matatika/files-dbt@v1.3
  utilities:
  - name: matatika
    variant: matatika
    pip_url: matatika~=1.17.1
  - name: dbt-artifacts
    variant: matatika
    pip_url: git+https://github.com/Matatika/dbt-artifacts-ext.git@v0.1.0
